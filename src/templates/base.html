<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}My Blog{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="page-bg"></div>

    <header class="site-header">
        <div class="site-header-inner">
            <h1 class="site-logo">
                <a href="/">soft cafe note</a>
            </h1>
            <p class="site-subtitle">little diary of cafe days</p>

            <nav class="site-nav">
                <a href="/">Home</a>
                <a href="/tags/">Tags</a>
            </nav>
        </div>
    </header>

<div class="center-illustration">
    <img src="/static/images/girl_illustration.png" alt="illustration">
</div>

    <main class="site-main">
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        <p>© My Blog</p>
    </footer>
</body>
</html>
