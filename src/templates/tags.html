{% extends "base.html" %}

{% block title %}タグ一覧{% endblock %}

{% block content %}
<h2 class="page-title">タグ一覧</h2>
<ul class="tag-cloud">
    {% for tag_name, posts in tags_map.items() %}
    <li>
        <a href="/tags/{{ tag_name }}.html">
            #{{ tag_name }} <span>({{ posts|length }})</span>
        </a>
    </li>
    {% endfor %}
</ul>
{% endblock %}
